name: Backend CI
# this command used for testing the backend
on:
  push:
    branches: [ main, master, staging, develop ]
  pull_request:
    branches: [ main, master, staging, develop ]

jobs:
  test:
    name: Backend Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: schools_management_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/schools_management_db?schema=public"
      DIRECT_URL: "postgresql://postgres:password@localhost:5432/schools_management_db?schema=public"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      PORT: "8000"
      JWT_SECRET: "ci-pipeline-test-secret-key-12345"
      JWT_EXPIRES_IN: "7d"
      SUPABASE_URL: "https://test.supabase.co"
      SUPABASE_ANON_KEY: "test-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "test-service-key"
      SUPABASE_BUCKET: "assets"
      INITIAL_ADMIN_EMAIL: "admin@test.com"
      INITIAL_ADMIN_PASSWORD: "admin123456"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Prisma Generate
        run: npx prisma generate

      - name: Prisma DB Push
        run: npx prisma db push

      - name: Prisma DB Seed
        run: npx prisma db seed

      - name: Run Tests
        run: npm test
